<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">MySite</a>

                <li><a href="index.html">Home</a></li>

            </ul>

    <main>
        <section class="page-content">
            <h1>Contact Me</h1>
            <div class="contact-container">
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">niimatullahi hussaini</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">niimatullahihussaini2@gmail.com</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
                <div class="contact-info">
                    <h3>Other Ways to Reach Me</h3>
                    <p>📧 email@niimatullahihussaini2@gmail.com</p>
                    <p>📱 +2348095511220</p>
                    <div class="social-links">
                        <a href="#">LinkedIn</a>
                        <a href="https://github.com/niimatullahihussaini2-art">GitHub</a>
                        <a href="https://x.com/niimatullahy">Twitter</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
